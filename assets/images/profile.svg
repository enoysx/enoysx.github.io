<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f3f4f6"/>
  
  <!-- Circle avatar background -->
  <circle cx="200" cy="120" r="80" fill="#2563eb"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="50" fill="#fdbf64"/>
  
  <!-- Ears -->
  <circle cx="150" cy="110" r="15" fill="#fdbf64"/>
  <circle cx="250" cy="110" r="15" fill="#fdbf64"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="110" r="8" fill="#1f2937"/>
  <circle cx="215" cy="110" r="8" fill="#1f2937"/>
  
  <!-- Eye shine -->
  <circle cx="186" cy="108" r="3" fill="white"/>
  <circle cx="216" cy="108" r="3" fill="white"/>
  
  <!-- Nose -->
  <line x1="200" y1="115" x2="200" y2="130" stroke="#1f2937" stroke-width="2"/>
  
  <!-- Smile -->
  <path d="M 195 140 Q 200 145 205 140" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <path d="M 160 170 L 160 280 Q 160 310 190 310 L 210 310 Q 240 310 240 280 L 240 170" fill="#6b7280"/>
  
  <!-- Shirt -->
  <rect x="170" y="180" width="60" height="80" fill="#3b82f6" rx="5"/>
  
  <!-- Arms -->
  <ellipse cx="150" cy="210" rx="20" ry="50" fill="#fdbf64"/>
  <ellipse cx="250" cy="210" rx="20" ry="50" fill="#fdbf64"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="25" fill="#dbeafe" opacity="0.5"/>
  <circle cx="320" cy="150" r="35" fill="#dbeafe" opacity="0.5"/>
  <circle cx="80" cy="300" r="20" fill="#dbeafe" opacity="0.5"/>
</svg>
